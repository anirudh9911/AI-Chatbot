apiVersion: v1
kind: ConfigMap
metadata:
  name: inquiro-config
  namespace: inquiro
data:
  # Non-sensitive environment variables shared across services.
  # Secrets (API keys) live in secret.yaml — never here.
  ALLOWED_ORIGINS: "http://localhost:3000"
  DATABASE_URL: "sqlite:///./data/inquiro.db"
  # Server is ClusterIP (internal only). Expose it to the browser via:
  # kubectl port-forward svc/server-svc 8000:8000 -n inquiro
  NEXT_PUBLIC_API_URL: "http://localhost:8000"
