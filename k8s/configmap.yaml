apiVersion: v1
kind: ConfigMap
metadata:
  name: inquiro-config
  namespace: inquiro
data:
  # Non-sensitive environment variables shared across services.
  ALLOWED_ORIGINS: "http://localhost:3000"
  DATABASE_URL: "sqlite:///./data/inquiro.db"
  # Next.js proxies /api/* to the server pod internally via ClusterIP DNS.
  # The browser only ever talks to port 3000 — no port-forward needed.
  INTERNAL_API_URL: "http://server-svc:8000"
