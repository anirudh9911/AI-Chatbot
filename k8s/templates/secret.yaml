# IMPORTANT: This file is a template. Do NOT commit real API keys.
# To generate a base64 value:  echo -n "your-key-here" | base64
#
# Apply with your real values:
#   kubectl create secret generic inquiro-secrets \
#     --from-literal=OPENAI_API_KEY=sk-... \
#     --from-literal=TAVILY_API_KEY=tvly-... \
#     -n inquiro
apiVersion: v1
kind: Secret
metadata:
  name: inquiro-secrets
  namespace: inquiro
type: Opaque
data:
  OPENAI_API_KEY: <base64-encoded-value>
  TAVILY_API_KEY: <base64-encoded-value>
