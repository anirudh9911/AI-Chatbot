name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Python lint ─────────────────────────────────────────────────────
  lint-server:
    name: Lint Python (server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 server/app.py server/database.py server/logging_config.py --max-line-length=100

  # ── Job 2: TypeScript lint ─────────────────────────────────────────────────
  lint-client:
    name: Lint TypeScript (client)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix client

      - name: Run ESLint
        run: npm run lint --prefix client

  # ── Job 3: Docker build (server) ───────────────────────────────────────────
  docker-build-server:
    name: Docker Build (server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: inquiro-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Docker build (client) ───────────────────────────────────────────
  docker-build-client:
    name: Docker Build (client)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: inquiro-client:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
